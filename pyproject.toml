[project]
name = "accounts"
version = "0.1.0"
description = ""
authors = [{ name = "one-zero-eight" }]
urls = { homepage = "https://t.me/one_zero_eight" }
readme = "README.md"
requires-python = ">=3.13,<3.14"

dependencies = [
    "aiolimiter>=1.2.0",
    "authlib>=1.7.2",
    "beanie>=1.30.0,<2.0.0",
    "colorlog>=6.8.2",
    "fastapi>=0.136.1",
    "fastapi-swagger>=0.4.49",
    "gunicorn==23.0.0",
    "httpx>=0.27.0",
    "itsdangerous>=2.1.2",
    "prek>=0.3.13",
    "pydantic[email]>=2.13.4",
    "python-multipart>=0.0.27",
    "pyyaml>=6.0.1",
    "rapidfuzz>=3.14.5",
    "ruff>=0.15.12",
    "uvicorn>=0.46.0",
]

[tool.pytest.ini_options]
pythonpath = ["."]

[tool.ruff]
line-length = 120
lint.extend-select = ["I", "UP", "PL"]
lint.extend-ignore = ["PLC0415", "PLR"]
target-version = "py313"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
]
